<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DriftV8 Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --black: #050507; --surface-0: #0a0a0f; --surface-1: #111118; --surface-2: #18181f; --surface-3: #1f1f28;
    --border: rgba(255,255,255,0.07); --border-hover: rgba(255,255,255,0.14);
    --text-primary: #f0f0f5; --text-secondary: #8b8b99; --text-muted: #4a4a58;
    --white: #ffffff; --glass-bg: rgba(255,255,255,0.03); --glass-border: rgba(255,255,255,0.08);
    --green: #6ad98a; --amber: #f0c060; --blue: #7aa6ff; --red: #e07070;
  }
  html { font-size: 16px; }
  body { background: var(--black); color: var(--text-primary); font-family: 'Inter', sans-serif; line-height: 1.5; min-height: 100vh; -webkit-font-smoothing: antialiased; }
  ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: var(--black); } ::-webkit-scrollbar-thumb { background: var(--surface-3); border-radius: 3px; }
  .wrap { max-width: 920px; margin: 0 auto; padding: 32px 24px 80px; }
  .brand { font-family: 'Space Grotesk', sans-serif; font-size: 1.15rem; font-weight: 700; color: var(--white); letter-spacing: -0.02em; margin-bottom: 4px; }
  .brand span { color: var(--text-secondary); font-weight: 400; }
  .subtitle { font-size: 0.85rem; color: var(--text-muted); }

  .gate { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .gate-card { width: 100%; max-width: 360px; background: var(--surface-1); border: 1px solid var(--border); border-radius: 18px; padding: 36px 32px; text-align: center; }
  .gate-card .brand { justify-content: center; margin-bottom: 24px; font-size: 1.3rem; }
  .gate-card input { width: 100%; padding: 13px 16px; border-radius: 10px; background: var(--glass-bg); border: 1px solid var(--glass-border); color: var(--text-primary); font-size: 0.95rem; font-family: 'Inter', sans-serif; outline: none; margin-bottom: 12px; text-align: center; letter-spacing: 0.1em; }
  .gate-card input:focus { border-color: rgba(255,255,255,0.25); }
  .gate-card button { width: 100%; padding: 13px; border-radius: 10px; background: var(--white); color: var(--black); font-size: 0.9rem; font-weight: 600; border: none; cursor: pointer; transition: opacity 0.2s; }
  .gate-card button:hover { opacity: 0.9; }
  .gate-error { color: var(--red); font-size: 0.82rem; margin-top: 10px; min-height: 18px; }

  .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; flex-wrap: wrap; gap: 16px; }
  .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 28px; }
  .stat { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 14px; padding: 16px; text-align: center; }
  .stat-num { font-family: 'Space Grotesk', sans-serif; font-size: 1.6rem; font-weight: 700; color: var(--white); letter-spacing: -0.03em; }
  .stat-label { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 4px; }

  .filters { display: flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; }
  .filter-btn { padding: 7px 16px; border-radius: 100px; background: var(--glass-bg); border: 1px solid var(--glass-border); color: var(--text-secondary); font-size: 0.8rem; font-weight: 500; cursor: pointer; transition: border-color 0.2s, color 0.2s, background 0.2s; }
  .filter-btn:hover { border-color: var(--border-hover); color: var(--text-primary); }
  .filter-btn.active { background: var(--surface-2); border-color: var(--border-hover); color: var(--white); }

  .req-list { display: flex; flex-direction: column; gap: 12px; }
  .req-card { background: var(--surface-1); border: 1px solid var(--border); border-radius: 16px; padding: 20px 22px; transition: border-color 0.2s; }
  .req-card:hover { border-color: var(--border-hover); }
  .req-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
  .req-meta { font-size: 0.78rem; color: var(--text-muted); }
  .req-name { font-weight: 600; color: var(--white); font-size: 0.98rem; margin-bottom: 2px; }
  .req-contact { font-size: 0.82rem; color: var(--text-secondary); }
  .req-subject { font-size: 0.85rem; color: var(--text-secondary); font-weight: 500; margin: 2px 0 6px; }
  .req-msg { font-size: 0.88rem; color: var(--text-secondary); line-height: 1.6; padding: 12px 14px; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 10px; margin-bottom: 14px; white-space: pre-wrap; }

  .status-badge { display: inline-flex; align-items: center; gap: 6px; padding: 5px 14px; border-radius: 100px; font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; white-space: nowrap; }
  .status-badge .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
  .status-pending { background: rgba(240,192,96,0.1); border: 1px solid rgba(240,192,96,0.25); color: var(--amber); }
  .status-processing { background: rgba(122,166,255,0.1); border: 1px solid rgba(122,166,255,0.25); color: var(--blue); }
  .status-completed { background: rgba(106,217,138,0.1); border: 1px solid rgba(106,217,138,0.25); color: var(--green); }

  .controls-row { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 10px; align-items: end; }
  .field-group { display: flex; flex-direction: column; gap: 6px; }
  .field-group label { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; }
  .field-group select, .field-group input { padding: 10px 12px; border-radius: 8px; background: var(--glass-bg); border: 1px solid var(--glass-border); color: var(--text-primary); font-size: 0.85rem; font-family: 'Inter', sans-serif; outline: none; -webkit-appearance: none; }
  .field-group select:focus, .field-group input:focus { border-color: rgba(255,255,255,0.25); }
  .save-btn { padding: 10px 18px; border-radius: 8px; background: var(--white); color: var(--black); font-size: 0.85rem; font-weight: 600; border: none; cursor: pointer; transition: opacity 0.2s; white-space: nowrap; }
  .save-btn:hover { opacity: 0.9; }
  .save-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .saved-flash { font-size: 0.78rem; color: var(--green); margin-top: 8px; display: none; }
  .saved-flash.show { display: block; }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
  .empty-state i { font-size: 2rem; margin-bottom: 12px; display: block; opacity: 0.5; }
  .refresh-btn { padding: 9px 16px; border-radius: 8px; background: var(--surface-2); border: 1px solid var(--border); color: var(--text-primary); font-size: 0.82rem; font-weight: 500; cursor: pointer; transition: border-color 0.2s, background 0.2s; display: inline-flex; align-items: center; gap: 8px; }
  .refresh-btn:hover { border-color: var(--border-hover); background: var(--surface-3); }
  .logout-btn { padding: 9px 16px; border-radius: 8px; background: transparent; border: 1px solid var(--border); color: var(--text-secondary); font-size: 0.82rem; font-weight: 500; cursor: pointer; transition: border-color 0.2s, color 0.2s; }
  .logout-btn:hover { border-color: var(--border-hover); color: var(--text-primary); }
  .top-actions { display: flex; gap: 8px; align-items: center; }

  @media(max-width: 640px) {
    .controls-row { grid-template-columns: 1fr 1fr; }
    .controls-row .save-btn { grid-column: span 2; }
    .stats-row { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<div id="gate" class="gate">
  <div class="gate-card">
    <div class="brand">DriftV8<span>.xyz</span></div>
    <p class="subtitle" style="margin-bottom:20px;">Admin access</p>
    <input type="password" id="pw-input" placeholder="Enter password" autocomplete="off">
    <button onclick="tryLogin()">Unlock</button>
    <div class="gate-error" id="gate-error"></div>
  </div>
</div>

<div id="panel" class="wrap" style="display:none;">
  <div class="topbar">
    <div>
      <div class="brand">DriftV8<span>.xyz</span> Admin</div>
      <p class="subtitle">Manage incoming requests</p>
    </div>
    <div class="top-actions">
      <button class="refresh-btn" onclick="loadRequests()"><i class="fa-solid fa-rotate"></i> Refresh</button>
      <button class="logout-btn" onclick="logout()">Log out</button>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat"><div class="stat-num" id="stat-total">0</div><div class="stat-label">Total</div></div>
    <div class="stat"><div class="stat-num" id="stat-pending">0</div><div class="stat-label">Pending</div></div>
    <div class="stat"><div class="stat-num" id="stat-processing">0</div><div class="stat-label">Processing</div></div>
    <div class="stat"><div class="stat-num" id="stat-completed">0</div><div class="stat-label">Completed</div></div>
  </div>

  <div class="filters">
    <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">All</button>
    <button class="filter-btn" data-filter="pending" onclick="setFilter('pending')">Pending</button>
    <button class="filter-btn" data-filter="processing" onclick="setFilter('processing')">Processing</button>
    <button class="filter-btn" data-filter="completed" onclick="setFilter('completed')">Completed</button>
  </div>

  <div class="req-list" id="req-list">
    <div class="empty-state"><i class="fa-solid fa-circle-notch fa-spin"></i>Loading requests...</div>
  </div>
</div>

<script>
const ADMIN_PASSWORD = 'driftv8admin';
let allRequests = [];
let currentFilter = 'all';

function tryLogin(){
  const input = document.getElementById('pw-input');
  const err = document.getElementById('gate-error');
  if(input.value === ADMIN_PASSWORD){
    document.getElementById('gate').style.display = 'none';
    document.getElementById('panel').style.display = 'block';
    try { sessionStorage.setItem('driftv8-admin-auth', '1'); } catch(e){}
    loadRequests();
  } else {
    err.textContent = 'Incorrect password.';
    input.value = '';
  }
}
document.getElementById('pw-input').addEventListener('keydown', e => { if(e.key==='Enter') tryLogin(); });

function logout(){
  try { sessionStorage.removeItem('driftv8-admin-auth'); } catch(e){}
  document.getElementById('panel').style.display = 'none';
  document.getElementById('gate').style.display = 'flex';
  document.getElementById('pw-input').value = '';
}

(function(){
  try {
    if(sessionStorage.getItem('driftv8-admin-auth') === '1'){
      document.getElementById('gate').style.display = 'none';
      document.getElementById('panel').style.display = 'block';
      loadRequests();
    }
  } catch(e){}
})();

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}

function formatDate(iso){
  try {
    const d = new Date(iso);
    return d.toLocaleDateString(undefined, { month:'short', day:'numeric', year:'numeric' }) + ' · ' + d.toLocaleTimeString(undefined, { hour:'2-digit', minute:'2-digit' });
  } catch(e){ return iso; }
}

async function loadRequests(){
  const list = document.getElementById('req-list');
  list.innerHTML = '<div class="empty-state"><i class="fa-solid fa-circle-notch fa-spin"></i>Loading requests...</div>';
  try {
    const keysResult = await window.storage.list('request:', true);
    const keys = (keysResult && keysResult.keys) ? keysResult.keys : [];
    if(keys.length === 0){
      allRequests = [];
      renderStats();
      list.innerHTML = '<div class="empty-state"><i class="fa-solid fa-inbox"></i>No requests yet. New form submissions from the website will appear here.</div>';
      return;
    }
    const items = [];
    for(const k of keys){
      try {
        const res = await window.storage.get(k, true);
        if(res && res.value){
          const data = JSON.parse(res.value);
          data._key = k;
          items.push(data);
        }
      } catch(e){}
    }
    items.sort((a,b) => new Date(b.createdAt || 0) - new Date(a.createdAt || 0));
    allRequests = items;
    renderStats();
    renderList();
  } catch(e){
    list.innerHTML = '<div class="empty-state"><i class="fa-solid fa-triangle-exclamation"></i>Could not load requests. Try refreshing.</div>';
  }
}

function renderStats(){
  document.getElementById('stat-total').textContent = allRequests.length;
  document.getElementById('stat-pending').textContent = allRequests.filter(r => (r.status||'pending') === 'pending').length;
  document.getElementById('stat-processing').textContent = allRequests.filter(r => r.status === 'processing').length;
  document.getElementById('stat-completed').textContent = allRequests.filter(r => r.status === 'completed').length;
}

function setFilter(f){
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.filter === f));
  renderList();
}

function renderList(){
  const list = document.getElementById('req-list');
  const filtered = currentFilter === 'all' ? allRequests : allRequests.filter(r => (r.status||'pending') === currentFilter);
  if(filtered.length === 0){
    list.innerHTML = '<div class="empty-state"><i class="fa-solid fa-filter"></i>No requests match this filter.</div>';
    return;
  }
  list.innerHTML = filtered.map(r => {
    const status = r.status || 'pending';
    const id = r._key;
    return `
    <div class="req-card">
      <div class="req-head">
        <div>
          <div class="req-name">${escapeHtml(r.name || 'Unknown')}</div>
          <div class="req-contact">${escapeHtml(r.email || '')}</div>
        </div>
        <div style="text-align:right;">
          <span class="status-badge status-${status}"><span class="dot"></span>${status}</span>
          <div class="req-meta" style="margin-top:6px;">${formatDate(r.createdAt)}</div>
        </div>
      </div>
      <div class="req-subject">${escapeHtml(r.subject || '')}</div>
      <div class="req-msg">${escapeHtml(r.message || '')}</div>
      <div class="controls-row">
        <div class="field-group">
          <label>Status</label>
          <select id="status-${id}">
            <option value="pending" ${status==='pending'?'selected':''}>Pending</option>
            <option value="processing" ${status==='processing'?'selected':''}>Processing</option>
            <option value="completed" ${status==='completed'?'selected':''}>Completed</option>
          </select>
        </div>
        <div class="field-group">
          <label>Quote</label>
          <input type="text" id="quote-${id}" placeholder="e.g. 15 EUR" value="${escapeHtml(r.quote || '')}">
        </div>
        <div class="field-group">
          <label>ETA</label>
          <input type="text" id="eta-${id}" placeholder="e.g. 24-48h" value="${escapeHtml(r.eta || '')}">
        </div>
        <button class="save-btn" onclick="saveRequest('${id}')">Save</button>
      </div>
      <div class="saved-flash" id="flash-${id}"><i class="fa-solid fa-circle-check"></i> Saved</div>
    </div>`;
  }).join('');
}

async function saveRequest(id){
  const req = allRequests.find(r => r._key === id);
  if(!req) return;
  const status = document.getElementById('status-'+id).value;
  const quote = document.getElementById('quote-'+id).value.trim();
  const eta = document.getElementById('eta-'+id).value.trim();
  req.status = status;
  req.quote = quote;
  req.eta = eta;
  req.updatedAt = new Date().toISOString();
  try {
    await window.storage.set(id, JSON.stringify(req), true);
    renderStats();
    document.querySelectorAll('.status-badge').forEach(b => {});
    const card = document.getElementById('flash-'+id);
    card.classList.add('show');
    setTimeout(() => card.classList.remove('show'), 2000);
    renderList();
    setTimeout(() => {
      const flash = document.getElementById('flash-'+id);
      if(flash) flash.classList.add('show');
      setTimeout(() => { if(flash) flash.classList.remove('show'); }, 2000);
    }, 50);
  } catch(e){
    alert('Failed to save. Try again.');
  }
}
</script>
</body>
</html>
